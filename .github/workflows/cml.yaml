name: Model CI

on:
  push:
  pull_request:

jobs:
  train-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Prepare data
        run: |
          python src/preprocessing.py data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv data/prepared

      - name: Train model
        run: |
          python src/train.py data/prepared data/models

      - name: Run tests
        env:
          F1_THRESHOLD: "0.50"
        run: |
          pytest -q

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            data/models/model.pkl
            metrics.json
            data/models/confusion_matrix.png
            data/models/feature_importance.png
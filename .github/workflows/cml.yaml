name: Model CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  train-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base tools
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 apache-airflow

      - name: Lint code
        run: |
          flake8 src dags tests --max-line-length=120

      - name: Prepare data
        run: |
          python src/preprocessing.py data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv data/prepared

      - name: Train model
        run: |
          python src/train.py data/prepared data/models

      - name: Run tests
        env:
          F1_THRESHOLD: "0.50"
        run: |
          pytest -q

      - name: Validate Airflow DAGs
        run: |
          python -c "from airflow.models import DagBag; dagbag = DagBag(dag_folder='dags', include_examples=False); assert len(dagbag.import_errors) == 0, dagbag.import_errors"

      - name: Build Docker image
        run: |
          docker build -t lab-mlops .

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            data/models/model.pkl
            metrics.json
            data/models/confusion_matrix.png
            data/models/feature_importance.png
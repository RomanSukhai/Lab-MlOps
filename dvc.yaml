stages:

  prepare:
    cmd: ./venv/bin/python src/preprocessing.py data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv data/prepared
    deps:
      - data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv
      - src/preprocessing.py
    outs:
      - data/prepared


  train:
    cmd: ./venv/bin/python src/train.py data/prepared data/models
    deps:
      - data/prepared
      - src/train.py
    outs:
      - data/models


  optimize:
    cmd: ./venv/bin/python src/optimize.py
    deps:
      - data/prepared
      - src/optimize.py
    outs:
      - models